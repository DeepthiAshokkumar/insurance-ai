<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Insurance Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <a href="index.html">Verification App</a>
        <a href="admin.html" class="active">Admin Dashboard</a>
    </nav>
    <div class="container">
        <header>
            <h1>Admin Dashboard</h1>
            <p>Database synchronization log for all historical insurance claims.</p>
        </header>

        <main>
            <div class="admin-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="margin: 0; font-size: 1.5rem;">Recent Claims Log</h2>
                    <button id="refreshBtn" class="btn-primary" style="width: auto; margin: 0; padding: 0.5rem 1rem; font-size: 0.9rem;">Refresh Data</button>
                </div>
                
                <div id="loading" class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Fetching database records...</p>
                </div>

                <div style="overflow-x: auto;">
                    <table class="admin-table hidden" id="adminTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Filename</th>
                                <th>Status</th>
                                <th>Missing Fields / Details Count</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Rows dynamcially injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="admin.js?v=2"></script>
</body>
</html>
